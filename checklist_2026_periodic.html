<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週期性任務檢核表 2026年</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .year-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .year-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .year-header {
            font-size: 1.8em;
            color: #667eea;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            font-weight: bold;
            flex: 1;
        }
        
        .print-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-left: 20px;
        }
        
        .print-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }
        
        .print-button:active {
            transform: translateY(0);
        }
        
        .period-grid-container {
            display: grid;
            grid-template-columns: 390px 455px 1fr;
            gap: 20px;
        }
        
        .column {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        
        .column-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #495057;
            margin-bottom: 15px;
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
        }
        
        .period-tasks {
            list-style: none;
        }
        
        .task-item {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: flex-start;
            transition: all 0.3s ease;
        }
        
        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }
        
        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }
        
        .task-item > div {
            flex: 1;
        }
        
        .task-item label {
            cursor: pointer;
            font-size: 0.95em;
            display: block;
            line-height: 1.6;
        }
        
        .subtask-list {
            list-style: none;
            margin: 0 0 0 0;
            padding: 0 0 0 0;
        }
        
        .subtask-item {
            padding: 4px 0 4px 12px;
            font-size: 0.85em;
            color: #6c757d;
            line-height: 1.6;
        }
        
        .reference {
            margin-top: 8px;
            padding: 6px 10px;
            background: #f1f3f5;
            border-radius: 4px;
            font-size: 0.8em;
            color: #495057;
            font-style: italic;
        }
        
        .deadline-indicator {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
            margin-right: 5px;
        }
        
        .month-indicator {
            display: inline-block;
            background: #e7f5ff;
            color: #1864ab;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 5px;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .year-section {
                box-shadow: none;
            }
            
            .print-button {
                display: none;
            }
            
            @page {
                size: A4 landscape;
                margin: 1cm;
            }
        }
        
        @media (max-width: 1400px) {
            .period-grid-container {
                grid-template-columns: 390px 455px 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="year-section">
            <div class="year-header-container">
                <div class="year-header">📅 週期性任務檢核表 - 2026年</div>
                <button class="print-button" onclick="window.print()">🖨️ 列印</button>
            </div>
            <div class="period-grid-container">
                <!-- Quarterly Tasks -->
                <div class="column">
                    <div class="column-title">每季任務</div>
                    <ul class="period-tasks">
                        <li class="task-item">
                            <input type="checkbox" id="quarterly-1">
                            <div>
                                <label for="quarterly-1"><span class="deadline-indicator">【每季10日前填報】</span>單位最適員額調查表<span class="month-indicator">1月、4月、7月、10月</span></label>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="quarterly-2">
                            <div>
                                <label for="quarterly-2"><span class="deadline-indicator">【每季月底前填送】</span>留職停薪人員關懷訪察表<span class="month-indicator">3月、6月、9月、12月</span></label>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="quarterly-3">
                            <div>
                                <label for="quarterly-3"><span class="deadline-indicator">【當月填報】</span>安全維護檢查報告<span class="month-indicator">3月、6月、9月、12月</span></label>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="quarterly-4">
                            <div>
                                <label for="quarterly-4"><span class="deadline-indicator">【每季結束5日內】</span>內部控制聲明書<span class="month-indicator">1月、4月、7月、10月</span></label>
                            </div>
                        </li>
                    </ul>
                </div>
                <!-- Semi-Annual Tasks -->
                <div class="column">
                    <div class="column-title">每半年任務</div>
                    <ul class="period-tasks">
                        <li class="task-item">
                            <input type="checkbox" id="semiannual-1">
                            <div>
                                <label for="semiannual-1"><span class="deadline-indicator">【上半年及下半年各一次】</span>員工特休排假表<span class="month-indicator">1月、7月</span></label>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="semiannual-2">
                            <div>
                                <label for="semiannual-2"><span class="deadline-indicator">【10日前填報】</span>理財專員高風險投資聲明書<span class="month-indicator">1月、7月</span></label>
                                <ul class="subtask-list">
                                    <li class="subtask-item">- 路徑：內網→電子表單→財富管理處，應列印留存，請經理放行及蓋章</li>
                                </ul>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="semiannual-3">
                            <div>
                                <label for="semiannual-3">安全維護會報紀錄表<span class="month-indicator">1月、7月</span></label>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="semiannual-4">
                            <div>
                                <label for="semiannual-4">自衛編組演練<span class="month-indicator">1月、7月</span></label>
                            </div>
                        </li>
                    </ul>
                </div>
                <!-- Annual Tasks -->
                <div class="column">
                    <div class="column-title">每年任務</div>
                    <ul class="period-tasks">
                        <li class="task-item">
                            <input type="checkbox" id="annual-1">
                            <div>
                                <label for="annual-1"><span class="deadline-indicator">【5~9月間】</span>行舍電氣(器)及資訊設備安全檢核表<span class="month-indicator">5月、6月、7月、8月、9月</span></label>
                                <ul class="subtask-list">
                                    <li class="subtask-item">- 保存 5 年</li>
                                </ul>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="annual-2">
                            <div>
                                <label for="annual-2"><span class="deadline-indicator">【8~9月】</span>職場不法侵害預防計畫表<span class="month-indicator">8月、9月</span></label>
                                <ul class="subtask-list">
                                    <li class="subtask-item">- 保存 3 年</li>
                                </ul>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="annual-3">
                            <div>
                                <label for="annual-3"><span class="deadline-indicator">【12月】</span>FO/FA 及其代理人應提供「信用報告」備查<span class="month-indicator">12月</span></label>
                                <ul class="subtask-list">
                                    <li class="subtask-item">- 路徑：內網→電子表單→財富管理處→FA/FO 綜合信用報告檢覈表</li>
                                </ul>
                            </div>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" id="annual-4">
                            <div>
                                <label for="annual-4"><span class="deadline-indicator">【接任滿3個月起，1年內應辦理1次】</span>無預警職務輪調<span class="month-indicator">全年</span></label>
                                <ul class="subtask-list">
                                    <li class="subtask-item">- 櫃員主任、ATM 經辦、DAO 至少連續 3 個營業日，並於 PeopleSoft 系統登錄</li>
                                    <li class="subtask-item">- 理專由總行指定期間，於輪調前一日至 PeopleSoft 系統登錄</li>
                                    <li class="subtask-item">- 均應填寫「無預警指定輪調登記表」</li>
                                    <li class="subtask-item">- 應填寫「職務交接查核紀錄表」</li>
                                </ul>
                            </div>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
    
    <script>
        // Save checkbox states to localStorage
        document.addEventListener('change', function(e) {
            if (e.target.type === 'checkbox') {
                localStorage.setItem(e.target.id, e.target.checked);
            }
        });
        
        // Load checkbox states from localStorage
        window.addEventListener('load', function() {
            document.querySelectorAll('input[type="checkbox"]').forEach(function(checkbox) {
                const saved = localStorage.getItem(checkbox.id);
                if (saved === 'true') {
                    checkbox.checked = true;
                }
            });
        });
        
        // Strike through completed tasks
        document.addEventListener('change', function(e) {
            if (e.target.type === 'checkbox') {
                const label = e.target.nextElementSibling.querySelector('label');
                if (label) {
                    if (e.target.checked) {
                        label.style.textDecoration = 'line-through';
                        label.style.opacity = '0.6';
                    } else {
                        label.style.textDecoration = 'none';
                        label.style.opacity = '1';
                    }
                }
            }
        });
        
        // Apply saved styles on load
        window.addEventListener('load', function() {
            document.querySelectorAll('input[type="checkbox"]').forEach(function(checkbox) {
                if (checkbox.checked) {
                    const label = checkbox.nextElementSibling.querySelector('label');
                    if (label) {
                        label.style.textDecoration = 'line-through';
                        label.style.opacity = '0.6';
                    }
                }
            });
        });
    </script>
</body>
</html>
